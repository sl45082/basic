<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Storm Cone Path</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
    }

    .image-row {
      display: flex;
      justify-content: center;
      align-items: stretch;
      gap: 10px;
      padding: 10px;
      height: auto;
      flex-wrap: nowrap;
    }

    .image-row img {
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    .image-wrapper {
      flex: 1;
    }

    .label {
      margin-top: 20px;
      font-size: 16px;
      text-align: center;
      color: #333;
    }

    @media (max-width: 768px) {
      .image-row {
        flex-direction: column;
      }

      .image-wrapper {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="image-row"> 
<div class="image-wrapper"> <img src=https://www.nhc.noaa.gov/storm_graphics/AT09/refresh/AL092025_5day_cone_no_line_and_wind+png/021446_5day_cone_no_line_and_wind.png> <div class=label>This storm is in the Atlantic.</div></div>  
<div class="image-wrapper"> <img src=https://www.nhc.noaa.gov/storm_graphics/EP15/refresh/EP152025_5day_cone_no_line_and_wind+png/022038_5day_cone_no_line_and_wind.png> <div class=label>This storm is in the Pacific.</div></div>  
 </div> </body> </html>
